<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 380px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; margin: 0; }
    h3 { margin-top: 0; font-size: 16px; color: #333; text-align: center; margin-bottom: 15px; }
    
    /* 语言选择区域布局 */
    .lang-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    select { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; outline: none; background-color: white; cursor: pointer;}
    
    /* 中间的切换按钮 */
    .swap-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 10px; color: #007bff; transition: transform 0.2s; }
    .swap-btn:hover { transform: scale(1.15); color: #0056b3; }
    
    textarea { width: 100%; height: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; resize: none; box-sizing: border-box; font-family: inherit; margin-bottom: 10px;}
    .main-btn { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background 0.2s; margin-bottom: 10px;}
    .main-btn:hover { background-color: #0056b3; }
    .main-btn:disabled { background-color: #a0c4ff; cursor: not-allowed; }
    #status { font-size: 12px; color: #666; text-align: center; height: 16px;}
  </style>
</head>
<body>
  <h3>⚡ 本地离线翻译引擎</h3>
  
  <!-- 顶部的语言选择与切换区域 -->
  <div class="lang-controls">
    <select id="source-lang">
      <option value="zh">🇨🇳 中文</option>
      <option value="en">🇬🇧 英文</option>
      <option value="de">🇩🇪 德文</option>
      <option value="es">🇪🇸 西班牙文</option>
    </select>
    
    <button id="swap-btn" class="swap-btn" title="切换语言">⇄</button>
    
    <select id="target-lang">
      <option value="en">🇬🇧 英文</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="de">🇩🇪 德文</option>
      <option value="es">🇪🇸 西班牙文</option>
    </select>
  </div>

  <textarea id="input-text" placeholder="请输入要翻译的文本..."></textarea>
  <button id="translate-btn" class="main-btn">翻 译</button>
  <textarea id="output-text" placeholder="翻译结果将显示在这里..." readonly></textarea>
  
  <div id="status">就绪 (请确保本地 5000 端口已开启)</div>

  <script src="popup.js"></script>
</body>
</html>
